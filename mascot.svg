<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 206" width="200" height="206" role="img" aria-label="promptu mascot: a friendly creature built from stacked prompt blocks, giving a thumbs-up">
  <title>promptu — stacked-blocks creature</title>

  <!-- mint badge background -->
  <rect x="6" y="4" width="188" height="198" rx="28" fill="#e3f2ee"/>

  <!-- feet -->
  <ellipse cx="82" cy="174" rx="11" ry="5" fill="#7D6EE8"/>
  <ellipse cx="118" cy="174" rx="11" ry="5" fill="#7D6EE8"/>

  <!-- arm with thumbs-up -->
  <path d="M150 106 Q168 104 174 98" fill="none" stroke="#2b2b3a" stroke-width="9" stroke-linecap="round"/>
  <rect x="168" y="84" width="18" height="14" rx="5.5" fill="#2b2b3a" transform="rotate(-12 177 91)"/>
  <rect x="170" y="73" width="8" height="17" rx="4" fill="#2b2b3a" transform="rotate(10 174 82)"/>

  <!-- bottom block (violet) -->
  <g>
    <rect x="55" y="130" width="90" height="40" rx="14" fill="#9B8CFF"/>
    <circle cx="68" cy="150" r="3.5" fill="#ffffff" opacity="0.9"/>
    <rect x="80" y="141" width="44" height="7" rx="3.5" fill="#ffffff" opacity="0.9"/>
    <rect x="80" y="153" width="28" height="7" rx="3.5" fill="#ffffff" opacity="0.6"/>
    <!-- prompt caret -->
    <rect x="114" y="152" width="4" height="11" rx="1.5" fill="#ffffff"/>
  </g>

  <!-- middle block (amber) -->
  <g>
    <rect x="46" y="84" width="108" height="40" rx="14" fill="#F2B441"/>
    <circle cx="59" cy="104" r="3.5" fill="#ffffff" opacity="0.9"/>
    <rect x="71" y="95" width="64" height="7" rx="3.5" fill="#ffffff" opacity="0.9"/>
    <rect x="71" y="107" width="46" height="7" rx="3.5" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- head block (teal) with face -->
  <g>
    <rect x="52" y="34" width="96" height="44" rx="14" fill="#5BC8AF"/>
    <!-- eyes -->
    <circle cx="84" cy="53" r="6.5" fill="#ffffff"/>
    <circle cx="85.5" cy="54" r="3.5" fill="#2b2b3a"/>
    <circle cx="116" cy="53" r="6.5" fill="#ffffff"/>
    <circle cx="117.5" cy="54" r="3.5" fill="#2b2b3a"/>
    <!-- cheeks -->
    <circle cx="70" cy="63" r="3.5" fill="#ffffff" opacity="0.25"/>
    <circle cx="130" cy="63" r="3.5" fill="#ffffff" opacity="0.25"/>
    <!-- smile -->
    <path d="M90 62 Q100 71 110 62" fill="none" stroke="#2b2b3a" stroke-width="3" stroke-linecap="round"/>
    <!-- antenna with a little bullet -->
    <line x1="100" y1="34" x2="100" y2="24" stroke="#5BC8AF" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="21" r="4" fill="#F2B441"/>
  </g>
</svg>
