<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 206" width="200" height="206" role="img" aria-label="promptu mascot: a friendly creature built from stacked terminal blocks">
  <title>promptu — stacked-terminal creature</title>

  <!-- mint badge background -->
  <rect x="6" y="4" width="188" height="198" rx="28" fill="#e3f2ee"/>

  <!-- feet -->
  <ellipse cx="82" cy="174" rx="11" ry="5" fill="#7D6EE8"/>
  <ellipse cx="118" cy="174" rx="11" ry="5" fill="#7D6EE8"/>

  <!-- antenna with a little bullet -->
  <line x1="100" y1="34" x2="100" y2="24" stroke="#2b2b3a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="21" r="4" fill="#F2B441"/>

  <!-- head block: terminal window with a face on screen -->
  <g>
    <rect x="52" y="34" width="96" height="44" rx="14" fill="#2b2b3a"/>
    <rect x="54" y="36" width="92" height="13" rx="10" fill="#3d3d4f"/>
    <rect x="54" y="43" width="92" height="6" fill="#3d3d4f"/>
    <circle cx="64" cy="42.5" r="2.8" fill="#E86A5E"/>
    <circle cx="73" cy="42.5" r="2.8" fill="#F2B441"/>
    <circle cx="82" cy="42.5" r="2.8" fill="#5BC8AF"/>
    <!-- eyes -->
    <rect x="79" y="54" width="7" height="10" rx="2" fill="#5BC8AF"/>
    <rect x="114" y="54" width="7" height="10" rx="2" fill="#5BC8AF"/>
    <!-- smile -->
    <path d="M92 69 Q100 74 108 69" fill="none" stroke="#5BC8AF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- middle block: prompt line and output -->
  <g>
    <rect x="46" y="84" width="108" height="40" rx="14" fill="#2b2b3a"/>
    <rect x="52" y="90" width="4" height="28" rx="2" fill="#F2B441"/>
    <path d="M62 98 l6 4.5 l-6 4.5" fill="none" stroke="#5BC8AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="76" y="99" width="36" height="5" rx="2.5" fill="#F2B441"/>
    <rect x="118" y="96" width="5" height="11" fill="#9B8CFF"/>
    <rect x="62" y="112" width="44" height="5" rx="2.5" fill="#7c8198"/>
  </g>

  <!-- bottom block: more output -->
  <g>
    <rect x="55" y="130" width="90" height="40" rx="14" fill="#2b2b3a"/>
    <rect x="61" y="136" width="4" height="28" rx="2" fill="#9B8CFF"/>
    <rect x="71" y="142" width="36" height="5" rx="2.5" fill="#9B8CFF"/>
    <rect x="113" y="140" width="4" height="9" fill="#ffffff" opacity="0.9"/>
    <rect x="71" y="154" width="24" height="5" rx="2.5" fill="#7c8198"/>
  </g>
</svg>
